name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        target:
          - { os: ubuntu-latest, triple: x86_64-unknown-linux-gnu }
          - { os: macos-latest, triple: x86_64-apple-darwin }
          - { os: macos-latest, triple: aarch64-apple-darwin }
          - { os: windows-latest, triple: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup install --profile minimal stable
          rustup target add ${{ matrix.target.triple }}

      - name: Build
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target.triple }}

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN="dietcpp-lsp.exe"
          else
            BIN="dietcpp-lsp"
          fi
          cp "target/${{ matrix.target.triple }}/release/${BIN}" "dist/${BIN}-${{ matrix.target.triple }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.triple }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*"
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
